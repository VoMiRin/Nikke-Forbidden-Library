<!DOCTYPE html>
<html lang="ko" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nikke Script Archive</title>
    <script>
      (() => {
        const storedTheme = localStorage.getItem('nikke-theme');
        const theme = storedTheme === 'light' ? 'light' : 'dark';
        document.documentElement.classList.toggle('dark', theme === 'dark');
        document.documentElement.dataset.theme = theme;
      })();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              'nikke-bg': 'rgb(var(--nikke-bg) / <alpha-value>)',
              'nikke-bg-alt': 'rgb(var(--nikke-bg-alt) / <alpha-value>)',
              'nikke-surface': 'rgb(var(--nikke-surface) / <alpha-value>)',
              'nikke-surface-low': 'rgb(var(--nikke-surface-low) / <alpha-value>)',
              'nikke-surface-high': 'rgb(var(--nikke-surface-high) / <alpha-value>)',
              'nikke-surface-highest': 'rgb(var(--nikke-surface-highest) / <alpha-value>)',
              'nikke-text-primary': 'rgb(var(--nikke-text-primary) / <alpha-value>)',
              'nikke-text-secondary': 'rgb(var(--nikke-text-secondary) / <alpha-value>)',
              'nikke-text-muted': 'rgb(var(--nikke-text-muted) / <alpha-value>)',
              'nikke-accent': 'rgb(var(--nikke-accent) / <alpha-value>)',
              'nikke-accent-strong': 'rgb(var(--nikke-accent-strong) / <alpha-value>)',
              'nikke-border': 'rgb(var(--nikke-border) / <alpha-value>)',
              'nikke-glow': 'rgb(var(--nikke-glow) / <alpha-value>)',
            },
            fontFamily: {
              sans: ['Manrope', 'sans-serif'],
              headline: ['Manrope', 'sans-serif'],
              body: ['Noto Serif KR', 'serif'],
              label: ['Inter', 'sans-serif'],
            },
            transitionTimingFunction: {
              editorial: 'cubic-bezier(0.22, 1, 0.36, 1)',
            },
            boxShadow: {
              glass: '0 24px 80px -40px rgba(56, 189, 248, 0.35)',
              ambient: '0 40px 80px -48px rgba(56, 189, 248, 0.22)',
            },
            backgroundImage: {
              'nikke-gradient': 'linear-gradient(135deg, rgb(var(--nikke-accent)) 0%, rgb(var(--nikke-accent-strong)) 100%)',
            },
          },
        },
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&family=Noto+Serif+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      :root {
        color-scheme: light;
        --nikke-bg: 244 241 236;
        --nikke-bg-alt: 255 252 247;
        --nikke-surface: 248 244 239;
        --nikke-surface-low: 242 236 229;
        --nikke-surface-high: 232 224 214;
        --nikke-surface-highest: 220 211 198;
        --nikke-text-primary: 30 34 39;
        --nikke-text-secondary: 70 77 84;
        --nikke-text-muted: 114 122 130;
        --nikke-accent: 17 120 168;
        --nikke-accent-strong: 56 189 248;
        --nikke-border: 135 148 156;
        --nikke-glow: 125 181 210;
      }

      .dark {
        color-scheme: dark;
        --nikke-bg: 19 19 19;
        --nikke-bg-alt: 24 23 23;
        --nikke-surface: 28 27 27;
        --nikke-surface-low: 32 31 31;
        --nikke-surface-high: 42 42 42;
        --nikke-surface-highest: 53 53 52;
        --nikke-text-primary: 229 226 225;
        --nikke-text-secondary: 189 200 209;
        --nikke-text-muted: 135 146 154;
        --nikke-accent: 142 213 255;
        --nikke-accent-strong: 56 189 248;
        --nikke-border: 62 72 79;
        --nikke-glow: 56 189 248;
      }

      html,
      body,
      #root {
        height: 100%;
      }

      body {
        margin: 0;
        background:
          radial-gradient(circle at top right, rgb(var(--nikke-glow) / 0.12), transparent 28%),
          linear-gradient(180deg, rgb(var(--nikke-bg-alt)) 0%, rgb(var(--nikke-bg)) 100%);
        color: rgb(var(--nikke-text-primary));
        font-family: 'Manrope', sans-serif;
        transition:
          background-color 350ms cubic-bezier(0.22, 1, 0.36, 1),
          color 350ms cubic-bezier(0.22, 1, 0.36, 1);
      }

      * {
        box-sizing: border-box;
      }

      ::selection {
        background: rgb(var(--nikke-accent-strong) / 0.24);
      }

      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }

      ::-webkit-scrollbar-track {
        background: rgb(var(--nikke-surface-low));
      }

      ::-webkit-scrollbar-thumb {
        background-color: rgb(var(--nikke-border) / 0.7);
        border-radius: 999px;
        border: 2px solid rgb(var(--nikke-surface-low));
      }

      ::-webkit-scrollbar-thumb:hover {
        background-color: rgb(var(--nikke-accent-strong) / 0.75);
      }
    </style>
  </head>
  <body class="bg-nikke-bg font-sans antialiased">
    <noscript>JavaScript를 활성화해야 앱을 사용할 수 있습니다.</noscript>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
